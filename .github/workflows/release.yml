name: Gemar Release CD

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release is cut from deploy branch
        env:
          DEPLOY_BRANCH: deploy/gemar-v16
          GIT_SHA: ${{ github.sha }}
        run: |
          git fetch --no-tags origin "+refs/heads/*:refs/remotes/origin/*"

          if ! git merge-base --is-ancestor "$GIT_SHA" "origin/$DEPLOY_BRANCH"; then
            echo "Tag commit $GIT_SHA is not contained in origin/$DEPLOY_BRANCH."
            echo "Create/push the release tag from a commit that is already on $DEPLOY_BRANCH."
            exit 1
          fi

      - name: Validate SemVer tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG_NAME' is not valid SemVer (expected vX.Y.Z[-prerelease][+build])."
            exit 1
          fi

      - name: Validate VERSION and CHANGELOG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION_FILE="$(cat VERSION)"
          EXPECTED="${TAG_NAME#v}"

          if [[ "$VERSION_FILE" != "$EXPECTED" ]]; then
            echo "VERSION ($VERSION_FILE) does not match tag ($EXPECTED)."
            exit 1
          fi

          if ! grep -q "^## \[$EXPECTED\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing section for $EXPECTED."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image tags
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC="$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/frappe-custom"

          docker build --pull -f images/custom/Containerfile -t "$IMAGE:$TAG_NAME" .
          docker push "$IMAGE:$TAG_NAME"

          VERSION="${TAG_NAME#v}"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          MINOR="$(echo "$VERSION" | cut -d. -f1-2)"

          if [[ "$TAG_NAME" != *"-"* ]]; then
            docker tag "$IMAGE:$TAG_NAME" "$IMAGE:v$MAJOR"
            docker tag "$IMAGE:$TAG_NAME" "$IMAGE:v$MINOR"
            docker push "$IMAGE:v$MAJOR"
            docker push "$IMAGE:v$MINOR"
          fi

      - name: Save release metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p release-metadata
          {
            echo "tag=$TAG_NAME"
            echo "sha=$GIT_SHA"
            echo "repository=$REPO"
            echo "built_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > release-metadata/release-info.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ github.ref_name }}
          path: release-metadata/release-info.txt

  publish-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --tag ${{ github.ref_name }}
          output: cliff-generated.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: cliff-generated.md

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ (vars['STAGING_ENABLED'] || 'false') == 'true' }}

    steps:
      - name: Deploy to staging
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          bash -lc "${{ secrets.STAGING_DEPLOY_COMMAND }}"

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ (vars['PRODUCTION_ENABLED'] || 'false') == 'true' }}

    steps:
      - name: Deploy to production
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          bash -lc "${{ secrets.PRODUCTION_DEPLOY_COMMAND }}"
