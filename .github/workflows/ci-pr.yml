name: Gemar CI PR

on:
  pull_request:
    branches:
      - deploy/gemar-v16
  workflow_dispatch:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build custom image
        run: |
          docker build --pull \
            -f images/custom/Containerfile \
            -t frappe-custom:pr-${{ github.sha }} \
            .

      - name: Smoke test image
        run: |
          docker run --rm frappe-custom:pr-${{ github.sha }} python --version
          docker run --rm frappe-custom:pr-${{ github.sha }} bash -lc "command -v bench >/dev/null && bench --version"
